{% macro secret_input(id, name) -%}
  <div class="secret-control">
    <input id="{{ id }}" name="{{ name }}" type="password" autocomplete="off" required data-secret-input>
    <button
      class="secret-toggle"
      type="button"
      data-secret-toggle
      aria-controls="{{ id }}"
      aria-label="Show secret value"
      aria-pressed="false"
    >
      <svg data-secret-icon-show aria-hidden="true" viewBox="0 0 24 24">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      <svg data-secret-icon-hide aria-hidden="true" viewBox="0 0 24 24" hidden>
        <path d="m2 2 20 20"></path>
        <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
        <path d="M17.9 17.9A9.4 9.4 0 0 1 12 20c-6.5 0-10-8-10-8a18.9 18.9 0 0 1 5.1-6.5"></path>
        <path d="M9.9 4.2A9.4 9.4 0 0 1 12 4c6.5 0 10 8 10 8a18.6 18.6 0 0 1-2 3.2"></path>
      </svg>
    </button>
  </div>
{%- endmacro %}
