{% if servers %}
  {% for server in servers %}
    <section>
      <h2>{{ server.name }}</h2>
      {% if server.required_headers %}
        {% for header_name in server.required_headers %}
          <form class="row" method="post" action="/api/secret">
            <input type="hidden" name="header_name" value="{{ header_name }}">
            <label>{{ header_name }}</label>
            <input name="value" type="password" autocomplete="off" placeholder="{% if header_name in secrets %}Saved{% else %}Required{% endif %}" required>
            <button type="submit">Save</button>
          </form>
        {% endfor %}
      {% else %}
        <p class="muted">No user header required.</p>
      {% endif %}
    </section>
  {% endfor %}
{% else %}
  <p class="muted">No accessible MCP server found for this key.</p>
{% endif %}
